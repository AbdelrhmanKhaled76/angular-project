<div class="app-container">
  <app-header></app-header>
  <main class="content">
    <app-carousel></app-carousel>
    <app-toaster [isAction]="isAction" [state]="state"></app-toaster>
    <div class="main-content">
      <app-input (addTask)="getTask($event)" (isState)="handleInputState($event)"></app-input>
      <app-cards-container [tasks]="tasks"></app-cards-container>
    </div>
  </main>
  <app-footer></app-footer>
</div>
