<div class="app-container">
  <app-header></app-header>
  <main class="content">
    <app-carousel></app-carousel>
    <app-toaster [isAction]="isAction" [state]="state"></app-toaster>
    <div class="main-content">
      <app-input (addTask)="handleAddTask($event)" [taskToEdit]="taskToEdit" (updateTask)="handleUpdateTask($event)" (isState)="handleInputState($event)"></app-input>
      <app-cards-container [task]="task" (deleteTask)="handleDeleteTask($event)" (editTask)="handleEditTask($event)" (notifyDeath)="handleComponentDeath()"></app-cards-container>
    </div>
  </main>
  <app-footer></app-footer>
</div>
