<div class="card">
  <div class="card-header">
    <h3 class="card-title">{{task.title}}</h3>
    <span class="priority-badge category-label">{{ task.category }}</span>
    <span class="priority-badge" [class]="task.priority">{{task.priority}}</span>
  </div>
  <div class="status-row" style="margin-bottom: 1rem; text-align: left;">
    <span class="priority-badge" [class.low]="task.isDone" [class.medium]="!task.isDone">
      {{ task.isDone ? 'Done' : 'In Progress' }}
    </span>
  </div>
  <p class="card-description">{{task.description}}</p>
  <div class="card-footer">
    <span class="due-date">Due: {{ task.date | date:'mediumDate' }}</span>
    <span class="tags">{{ task.tags }}</span>
  </div>
  @if (!task.isDone) {
  <button class="action-btn done-btn" (click)="onDone()">Done</button>
  }
  <div class="card-actions">
    <button class="action-btn edit-btn" (click)="onEdit()">Edit</button>
    <button class="action-btn delete-btn" (click)="onDelete()">Delete</button>
  </div>
</div>
