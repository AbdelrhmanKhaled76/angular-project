<section class="card-list">
  <h2 class="section-title">{{ listTitle }}</h2>
  @if(filteredTasks.length > 0){
  <div class="cards-grid">
    @for (task of filteredTasks; track task.id) {
    <app-card [task]="task" (deleteTask)="onDeleteTask($event)" (editTask)="editTask.emit($event)" (notifyDeath)="notifyDeath.emit()"></app-card>
    }
  </div>
  }
  @else {
  <p class="tasks text-center text-muted fw-bold fs-5 pt-5 pb-3">no tasks added yet</p>
  <img src="/figure-white2.jpg" alt="No tasks illustration" class="figure">
  }
</section>
