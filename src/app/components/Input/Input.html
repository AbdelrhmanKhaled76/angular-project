<div class="input-container">
  <div class="input-wrapper">
    <input type="text" placeholder="Task Title..." class="task-input" />

    <textarea placeholder="Description..." class="task-input"></textarea>

    <select class="task-input">
      <option value="" disabled selected>Select Priority...</option>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>

    <input type="date" class="task-input" />

    <select class="task-input">
      <option value="" disabled selected>Select Category...</option>
      <option value="work">Work</option>
      <option value="personal">Personal</option>
      <option value="study">Study</option>
    </select>

    <input type="text" placeholder="Tags (comma separated)..." class="task-input" />

    <button type="button" class="add-button">Add Task</button>
  </div>
</div>
